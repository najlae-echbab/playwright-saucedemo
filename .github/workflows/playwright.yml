name: Playwright CI

on:
  push:
    branches: [main, master]

  pull_request:
    branches: [main, master]

  schedule:
    - cron: "0 11 * * *" # tous les jours à 12h (Maroc = UTC+1)

  workflow_dispatch:
    inputs:
      test_type:
        description: "Type de tests à exécuter"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - ihm
          - mobile
          - responsive

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    env:
      TEST_TYPE: ${{ github.event.inputs.test_type || 'all' }}

    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run Playwright tests
        run: |
          echo "Running test type: $TEST_TYPE"

          if [ "$TEST_TYPE" = "ihm" ]; then
            npx playwright test tests/

          elif [ "$TEST_TYPE" = "mobile" ]; then
            npx playwright test --project=mobile-chrome --project=mobile-safari

          elif [ "$TEST_TYPE" = "responsive" ]; then
            npx playwright test tests/responsive

          else
            npx playwright test
          fi

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Upload test results
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/
          retention-days: 30
